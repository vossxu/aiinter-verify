<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAIC Verification Center</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f4f6f9; color: #1a202c; padding: 40px 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-title { font-size: 22px; font-weight: 700; color: #0f172a; }
        .logo-subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
        .search-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; }
        button { padding: 14px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .result-card { display: none; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; background: #f8fafc; border-left: 5px solid #10b981; }
        .result-card.active { display: block; }
        .result-item { display: flex; margin-bottom: 10px; font-size: 14px; }
        .result-item strong { width: 140px; color: #475569; }
        .no-data { display: none; text-align: center; color: #ef4444; background: #fef2f2; padding: 15px; border-radius: 8px; }
        .no-data.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-area">
        <div class="logo-title">IAIC Verification Center</div>
        <div class="logo-subtitle">国际人工智能委员会 · 凭证查询系统</div>
    </div>
    <div class="search-box">
        <input type="text" id="certInput" placeholder="Certificate No. / 证书编号">
        <input type="text" id="nameInput" placeholder="Name / 姓名或机构">
        <button onclick="handleSearch()">Verify / 查询</button>
    </div>
    <div id="resultCard" class="result-card">
        <div class="result-item"><strong>ID:</strong><span id="resId"></span></div>
        <div class="result-item"><strong>Type:</strong><span id="resType"></span></div>
        <div class="result-item"><strong>Status:</strong><span id="resStatus"></span></div>
    </div>
    <div id="noData" class="no-data">Not Found / 未找到记录</div>
</div>
<script>
    // 示例数据库，完整版本请见引用文件
    const database = [{ id: "CAIE-2026-0081", name: "Voss Xu", type: "Individual", status: "Valid" }];
    function handleSearch() {
        const cert = document.getElementById('certInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const res = database.find(i => i.id === cert && i.name === name);
        if (res) {
            document.getElementById('resId').innerText = res.id;
            document.getElementById('resType').innerText = res.type;
            document.getElementById('resStatus').innerText = res.status;
            document.getElementById('resultCard').classList.add('active');
            document.getElementById('noData').classList.remove('active');
        } else {
            document.getElementById('resultCard').classList.remove('active');
            document.getElementById('noData').classList.add('active');
        }
    }
</script>
</body>
</html>
